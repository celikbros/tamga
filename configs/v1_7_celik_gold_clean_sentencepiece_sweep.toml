[settings]
corpus = "data/train/claim_grade/celik_gold_clean_pilot.txt"
corpus_label = "local_celik_gold_clean_100k_pilot_not_claim_grade"
claim_grade = false
allow_train = true

[[eval_sets]]
name = "expanded"
path = "data/eval/tr_gold_expanded.tsv"
markdown_out = "artifacts/v1_7_celik_gold_clean_sentencepiece_sweep_expanded.md"

[[eval_sets]]
name = "challenge"
path = "data/eval/tr_challenge.tsv"
markdown_out = "artifacts/v1_7_celik_gold_clean_sentencepiece_sweep_challenge.md"

[[models]]
name = "sp_bpe_1000_celik_gold_clean"
model_type = "bpe"
vocab_size = 1000
model_prefix = "artifacts/private/v1_7_celik_gold_clean_sentencepiece/sp_bpe_1000_celik_gold_clean"
enabled = true

[[models]]
name = "sp_unigram_1000_celik_gold_clean"
