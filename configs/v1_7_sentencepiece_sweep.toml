[settings]
corpus = "data/train/tr_bpe_train.txt"
corpus_label = "demo_corpus_not_claim_grade"
claim_grade = false
allow_train = true

[[eval_sets]]
name = "expanded"
path = "data/eval/tr_gold_expanded.tsv"
markdown_out = "artifacts/v1_7_sentencepiece_sweep_expanded.md"

[[eval_sets]]
name = "challenge"
path = "data/eval/tr_challenge.tsv"
markdown_out = "artifacts/v1_7_sentencepiece_sweep_challenge.md"

[[models]]
name = "sp_bpe_1000_demo"
model_type = "bpe"
vocab_size = 1000
model_prefix = "artifacts/v1_7_sentencepiece_sweep/sp_bpe_1000_demo"
enabled = true

[[models]]
name = "sp_unigram_1000_demo"
model_type = "unigram"
vocab_size = 1000
model_prefix = "artifacts/v1_7_sentencepiece_sweep/sp_unigram_1000_demo"
enabled = true

