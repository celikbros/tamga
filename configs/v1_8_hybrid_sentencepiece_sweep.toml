[settings]
corpus = "artifacts/private/v1_8_hybrid_morph_pretok/train.morph_pretok.txt"
corpus_label = "v1_8_hybrid_morph_pretok_train_only_not_claim_grade"
claim_grade = false
allow_train = true

[[eval_sets]]
name = "expanded"
path = "data/eval/tr_gold_expanded.tsv"
markdown_out = "artifacts/v1_8_hybrid_sentencepiece_sweep_expanded.md"

[[eval_sets]]
name = "challenge"
path = "data/eval/tr_challenge.tsv"
markdown_out = "artifacts/v1_8_hybrid_sentencepiece_sweep_challenge.md"

[[models]]
name = "hybrid_morph_pretok_bpe_32000_train_only"
model_type = "bpe"
vocab_size = 32000
model_prefix = "artifacts/private/v1_8_hybrid_sentencepiece/hybrid_morph_pretok_bpe_32000_train_only"
enabled = true

[[models]]
name = "hybrid_morph_pretok_unigram_32000_train_only"
