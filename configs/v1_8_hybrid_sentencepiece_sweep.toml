vocab_size = 32000
model_prefix = "artifacts/private/v1_8_hybrid_sentencepiece/hybrid_morph_pretok_unigram_32000_train_only"
enabled = true

[[models]]
name = "hybrid_morph_pretok_bpe_64000_train_only"
