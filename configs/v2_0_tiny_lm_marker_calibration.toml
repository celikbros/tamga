[settings]
split_dir = "artifacts/private/v1_8_local_lm_probe/celik_tr_primary_multilingual_mix_lm_probe_pilot_20k/filtered_split"
output_dir = "artifacts/private/v2_0_tiny_lm_marker_calibration"
