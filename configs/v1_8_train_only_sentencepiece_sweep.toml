[settings]
corpus = "artifacts/private/v1_8_local_lm_probe/celik_tr_primary_multilingual_mix_lm_probe_pilot_20k/raw_split/train.txt"
corpus_label = "v1_8_train_split_only_not_claim_grade"
claim_grade = false
allow_train = true

[[eval_sets]]
name = "expanded"
path = "data/eval/tr_gold_expanded.tsv"
markdown_out = "artifacts/v1_8_train_only_sentencepiece_sweep_expanded.md"

[[eval_sets]]
name = "challenge"
path = "data/eval/tr_challenge.tsv"
markdown_out = "artifacts/v1_8_train_only_sentencepiece_sweep_challenge.md"

[[models]]
name = "sp_bpe_16000_train_only"
model_type = "bpe"
vocab_size = 16000
model_prefix = "artifacts/private/v1_8_train_only_sentencepiece/sp_bpe_16000_train_only"
enabled = true

[[models]]
name = "sp_unigram_16000_train_only"
model_type = "unigram"
vocab_size = 16000
model_prefix = "artifacts/private/v1_8_train_only_sentencepiece/sp_unigram_16000_train_only"
enabled = true

