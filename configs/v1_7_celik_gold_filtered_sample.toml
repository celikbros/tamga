[settings]
output_path = "data/train/claim_grade/celik_gold_filtered_pilot.txt"
manifest_out = "artifacts/v1_7_celik_gold_filtered_sample_manifest.md"
leakage_out = "artifacts/v1_7_celik_gold_filtered_sample_leakage_report.md"
max_output_lines = 100000
ngram_size = 8
normalize_lowercase = false
strip_punctuation = true
min_chars = 80
max_chars = 4192
max_utf8_bytes = 4192
drop_control_chars = true
drop_replacement_char = true
drop_mojibake_suspects = true
dedupe_exact = true
dedupe_normalized = true

[[eval_sets]]
name = "expanded"
path = "data/eval/tr_gold_expanded.tsv"

[[eval_sets]]
name = "challenge"
path = "data/eval/tr_challenge.tsv"

[[sources]]
# Deprecated historical raw-source pilot. Active v1.7 work should use
# configs/v1_7_celik_gold_clean_sample.toml instead.
name = "celik_gold_corpus_raw_deprecated_jsonl"
format = "jsonl"
path = "data/train/private/celik_ai/archive/deprecated/celik_gold_corpus.raw.deprecated.jsonl"
text_field = "text"
enabled = true
